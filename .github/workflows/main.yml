name: water_level
on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'   # UTC 22:00 → 北京时间 次日 06:00
    - cron: '30 22 * * *'  # UTC 22:30 → 北京时间 次日 06:30
    - cron: '0 23 * * *'   # UTC 23:00 → 北京时间 次日 07:00
    - cron: '30 23 * * *'  # UTC 23:30 → 北京时间 次日 07:30
    - cron: '0 0 * * *'    # UTC 00:00 → 北京时间 当日 08:00

jobs:
  run-python-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - run: pip install requests
      - run: python main.py